[paths]
# Local sensitive metadata and technical candidate artifacts. Imported videos remain external.
processed_dir = "data/processed"
results_dir = "data/results"
log_dir = "outputs/logs"
model_weights_dir = "models/weights"
torch_cache_dir = ".cache/torch"
ffmpeg_dir = "tools/ffmpeg"

[pipeline]
# Fast 2.0 FPS sampling profile: 2.5x speedup with optimal detection & anomaly accuracy.
sample_fps = 2.0
# Source-level candidate span: merge any-person detections across short detector dropouts.
person_presence_merge_gap_seconds = 8.0
merge_gap_seconds = 8.0
pre_roll_seconds = 2.0
post_roll_seconds = 2.0
random_background_count = 3
random_background_duration_seconds = 60.0
random_exclusion_seconds = 30.0
random_seed = 20260716

[models]
yolo11n_weights = "models/weights/yolo11n.pt"
rtdetr_l_weights = "models/weights/rtdetr-l.pt"

[providers.person_yolo]
enabled = false
optional = true
confidence_threshold = 0.30
iou_threshold = 0.45
image_size = 960
batch_size = 2
device = "auto"
half_precision = true
person_episode_gap_seconds = 8.0
# A suspect track becomes person evidence once its footpoint has moved this many initial bbox heights.
movement_threshold_ratio = 0.20

[providers.person_rtdetr]
enabled = true
optional = false
confidence_threshold = 0.30
iou_threshold = 0.45
image_size = 960
# Start conservatively; increase after benchmarking the selected source/GPU.
batch_size = 4
device = "auto"
half_precision = true
person_episode_gap_seconds = 8.0
# A suspect track becomes person evidence once its footpoint has moved this many initial bbox heights.
movement_threshold_ratio = 0.20

[export]
container = "mp4"
video_codec = "libx264"
audio_codec = "aac"

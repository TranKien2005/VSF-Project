[paths]
# Local sensitive metadata and technical candidate artifacts. Imported videos remain external.
processed_dir = "data/processed"
results_dir = "data/results"
log_dir = "outputs/logs"
model_weights_dir = "models/weights"
torch_cache_dir = ".cache/torch"
ffmpeg_dir = "tools/ffmpeg"

[pipeline]
# Temporary visual-debug profile: inspect person candidates at 5 FPS with ±5s context.
sample_fps = 5.0
# Source-level candidate span: merge any-person detections across short detector dropouts.
person_presence_merge_gap_seconds = 2.0
merge_gap_seconds = 5.0
pre_roll_seconds = 5.0
post_roll_seconds = 5.0
random_background_count = 3
random_background_duration_seconds = 60.0
random_exclusion_seconds = 30.0
random_seed = 20260716

[models]
yolo11n_weights = "models/weights/yolo11n.pt"
rtdetr_l_weights = "models/weights/rtdetr-l.pt"

[providers.person_yolo]
enabled = false
optional = true
confidence_threshold = 0.20
iou_threshold = 0.45
image_size = 960
batch_size = 2
device = "auto"
half_precision = true
person_episode_gap_seconds = 8.0

[providers.person_rtdetr]
enabled = true
optional = false
confidence_threshold = 0.20
iou_threshold = 0.45
image_size = 960
# Start conservatively; increase after benchmarking the selected source/GPU.
batch_size = 4
device = "auto"
half_precision = true
person_episode_gap_seconds = 8.0

[providers.anomaly]
enabled = true
motion_score_threshold = 0.08
black_brightness_threshold = 0.03
uniform_variance_threshold = 5.0
freeze_difference_threshold = 0.002
minimum_consecutive_signals = 3

[providers.cover_heuristic]
enabled = true
analysis_width = 640
dark_pixel_threshold = 35
dark_pixel_ratio_threshold = 0.85
brightness_low_threshold = 0.18
brightness_delta_threshold = 0.40
blur_laplacian_reference = 100.0
blur_score_threshold = 0.80
edge_density_threshold = 0.015
histogram_distance_threshold = 0.55
minimum_consecutive_signals = 3

[providers.camera_movement]
enabled = true
analysis_width = 640
max_corners = 300
quality_level = 0.01
min_distance_px = 8
min_tracked_points = 30
min_inlier_ratio = 0.60
translation_threshold_px = 12.0
rotation_threshold_deg = 1.5
scale_delta_threshold = 0.03
shift_score_threshold = 0.65
scene_change_histogram_threshold = 0.70
minimum_consecutive_signals = 2

[export]
container = "mp4"
video_codec = "libx264"
audio_codec = "aac"
